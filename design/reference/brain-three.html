<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_2 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_2" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_2');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Colors from Design System
const iceBlue = 0x4DE3FF;
const softWhite = 0xEEF4FF;

// Brain Parameters
const dotCount = 700;
const connectionDistance = 0.25;
const brainGroup = new THREE.Group();
scene.add(brainGroup);

// Create dots in a brain silhouette (two ellipsoids with a central fissure)
const dots = [];
const dotGeometry = new THREE.SphereGeometry(0.008, 8, 8);

for (let i = 0; i < dotCount; i++) {
    const isLeft = Math.random() > 0.5;
    const xOffset = isLeft ? -0.3 : 0.3;
    
    // Silhouette shaping
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = Math.pow(Math.random(), 0.5) * 0.8;
    
    let x = r * Math.sin(phi) * Math.cos(theta);
    let y = r * Math.sin(phi) * Math.sin(theta) * 1.2; // Taller
    let z = r * Math.cos(phi) * 0.7; // Flatter
    
    x = x * 0.5 + xOffset;
    
    const dotMaterial = new THREE.MeshBasicMaterial({ 
        color: new THREE.Color().setHSL(0.55, 0.8, 0.7 + Math.random() * 0.3),
        transparent: true,
        opacity: 0.6
    });
    
    const dot = new THREE.Mesh(dotGeometry, dotMaterial);
    dot.position.set(x, y, z);
    brainGroup.add(dot);
    dots.push(dot);
}

// Connections
const lineMaterial = new THREE.LineBasicMaterial({ 
    color: iceBlue, 
    transparent: true, 
    opacity: 0.1 
});

for (let i = 0; i < dots.length; i++) {
    let connections = 0;
    const geometry = new THREE.BufferGeometry();
    const positions = [];
    
    for (let j = i + 1; j < dots.length && connections < 4; j++) {
        const dist = dots[i].position.distanceTo(dots[j].position);
        if (dist < connectionDistance) {
            positions.push(dots[i].position.x, dots[i].position.y, dots[i].position.z);
            positions.push(dots[j].position.x, dots[j].position.y, dots[j].position.z);
            connections++;
        }
    }
    
    if (positions.length > 0) {
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        const line = new THREE.LineSegments(geometry, lineMaterial);
        brainGroup.add(line);
    }
}

// Thought Orb
const orbGeom = new THREE.SphereGeometry(0.03, 16, 16);
const orbMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const orb = new THREE.Mesh(orbGeom, orbMat);
scene.add(orb);

// Path for orb
let currentDotIndex = Math.floor(Math.random() * dots.length);
let nextDotIndex = -1;
let progress = 0;

function findNextDot(index) {
    let best = -1;
    let minDist = Infinity;
    for(let i=0; i<dots.length; i++) {
        if(i === index) continue;
        const d = dots[index].position.distanceTo(dots[i].position);
        if(d < 0.3 && d < minDist && Math.random() > 0.5) {
            minDist = d;
            best = i;
        }
    }
    return best === -1 ? Math.floor(Math.random() * dots.length) : best;
}

nextDotIndex = findNextDot(currentDotIndex);

camera.position.z = 2.5;

function animate() {
    requestAnimationFrame(animate);
    
    // Slow rotation
    brainGroup.rotation.y += 0.002;
    
    // Move Orb
    progress += 0.01;
    if (progress >= 1) {
        progress = 0;
        currentDotIndex = nextDotIndex;
        nextDotIndex = findNextDot(currentDotIndex);
    }
    
    const start = dots[currentDotIndex].position;
    const end = dots[nextDotIndex].position;
    orb.position.lerpVectors(start, end, progress);
    orb.position.applyMatrix4(brainGroup.matrixWorld);

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_2 -->
</body>
</html>
